<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PayPal Payment - Joey Flav</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .success-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    }
    .success-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 50px;
      text-align: center;
      max-width: 500px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .spinner {
      border: 3px solid rgba(255,255,255,0.1);
      border-top: 3px solid #0070ba;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .paypal-logo {
      font-size: 40px;
      color: #0070ba;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="success-page">
    <div class="success-card">
      <div id="loading">
        <div class="paypal-logo">
          <i class="fab fa-paypal"></i>
        </div>
        <div class="spinner"></div>
        <h2>Completing your PayPal payment...</h2>
        <p>Please wait while we process your order.</p>
      </div>
      
      <div id="success" style="display: none;">
        <div style="font-size: 60px; color: #00b894; margin-bottom: 20px;">
          <i class="fas fa-check-circle"></i>
        </div>
        <h1>Payment Complete! 🎉</h1>
        <p>Your beat files have been sent to your email.</p>
        <div style="margin-top: 30px;">
          <a href="index.html" class="btn-primary">Back to Home</a>
        </div>
      </div>
      
      <div id="error" style="display: none;">
        <div style="font-size: 60px; color: #e74c3c; margin-bottom: 20px;">
          <i class="fas fa-times-circle"></i>
        </div>
        <h1>Payment Failed</h1>
        <p id="error-message">Something went wrong with your payment.</p>
        <a href="buy.html" class="btn-primary" style="margin-top: 20px;">Try Again</a>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // PayPal returns with ?token= and &PayerID= parameters
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token'); // This is the order ID
      const payerId = urlParams.get('PayerID');

      if (!token || !payerId) {
        showError('Invalid PayPal response');
        return;
      }

      try {
        // Capture the payment
        const response = await fetch('http://localhost:3000/capture-paypal-order', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ orderId: token })
        });

        const data = await response.json();

        if (data.success) {
          document.getElementById('loading').style.display = 'none';
          document.getElementById('success').style.display = 'block';
        } else {
          showError(data.message || 'Payment capture failed');
        }
      } catch (error) {
        showError('Could not complete payment');
      }
    });

    function showError(message) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      document.getElementById('error-message').textContent = message;
    }
  </script>
</body>
</html>
