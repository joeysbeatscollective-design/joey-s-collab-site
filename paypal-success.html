<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PayPal Payment - Joey Flavour</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="success-page">
  
  <div class="success-container">
    <!-- Loading State -->
    <div id="loading" class="success-card">
      <div class="paypal-logo">
        <i class="fab fa-paypal"></i>
      </div>
      <div class="loading-spinner"></div>
      <h2>Completing your PayPal payment...</h2>
      <p>Please wait while we process your order</p>
    </div>
    
    <!-- Success State -->
    <div id="success" class="success-card" style="display: none;">
      <div class="success-icon">
        <i class="fas fa-check"></i>
      </div>
      <h1>Payment Complete!</h1>
      <p>Your beat files have been sent to your email.</p>
      <div class="success-actions">
        <a href="index.html" class="btn-primary">
          <span>Back to Home</span>
        </a>
      </div>
    </div>
    
    <!-- Error State -->
    <div id="error" class="success-card error" style="display: none;">
      <div class="success-icon error-icon">
        <i class="fas fa-times"></i>
      </div>
      <h1>Payment Failed</h1>
      <p id="error-message">Something went wrong with your payment.</p>
      <a href="buy.html" class="btn-primary">
        <span>Try Again</span>
      </a>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');
      const payerId = urlParams.get('PayerID');

      if (!token || !payerId) {
        showError('Invalid PayPal response');
        return;
      }

      try {
        const response = await fetch('http://localhost:3000/capture-paypal-order', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ orderId: token })
        });

        const data = await response.json();

        if (data.success) {
          document.getElementById('loading').style.display = 'none';
          document.getElementById('success').style.display = 'block';
        } else {
          showError(data.message || 'Payment capture failed');
        }
      } catch (error) {
        showError('Could not complete payment');
      }
    });

    function showError(message) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      document.getElementById('error-message').textContent = message;
    }
  </script>
</body>
</html>
