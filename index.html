<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JoeyFlavour — Collabs</title>
<link rel="stylesheet" href="./css/styles.css">
<script src="https://unpkg.com/wavesurfer.js"></script>
</head>
<body>

<header class="header">
  <a class="nav-link" href="#">JoeyFlavour</a>
  <nav class="nav">
    <a class="nav-link active" href="#beats">Collab Beats</a>
  </nav>
</header>

<section class="hero">
  <h1>Beats Ready for Collaborations</h1>
  <p>All beats are FREE for vocals. Download and use for collabs!</p>
</section>

<section id="beats" class="grid">
  <div class="product-card">
    <div class="product-image-container">
      <img class="product-image" src="./covers/ABYSS.png" alt="Abyss Cover">
    </div>
    <div class="card-body">
      <div class="card-title">Abyss</div>
      <div class="card-producer">Prod. JoeyFlavour</div>
      <div class="wave" id="wave-beat1"></div>
      <div class="tags"><span class="tag">Dark</span> <span class="tag">Hard</span></div>
      <button class="btn-prism" onclick="downloadBeat('beats/Abyss.mp3')">FREE DOWNLOAD</button>
    </div>
  </div>
  <!-- Add more beats similarly -->
</section>

<div class="player" id="player">
  <div class="player-info">
    <img class="player-thumb" id="pThumb" src="./covers/ABYSS.png">
    <div>
      <div id="pTitle">—</div>
      <div>JoeyFlavour</div>
    </div>
  </div>
  <div class="player-controls">
    <button onclick="prevTrack()">⏮</button>
    <button id="pPlayBtn" onclick="togglePlayer()">▶</button>
    <button onclick="nextTrack()">⏭</button>
  </div>
</div>

<script src="./js/main.js"></script>
</body>
</html>
