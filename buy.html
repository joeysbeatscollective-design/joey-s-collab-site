<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Buy Beats - Joey Flavour</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>Buy Beats 💳</h1>
    <button id="dark-mode-toggle">🌙 Dark Mode</button>
  </header>

  <section class="beat-grid">
    <div class="beat-card">
      <img src="covers/cover3.jpg" alt="Beat Cover">
      <audio class="waveform-player" src="audio/tracks/beat3.mp3"></audio>
      <select class="license-select">
        <option value="mp3">MP3 License</option>
        <option value="wav">WAV License</option>
        <option value="stems">STEMS License</option>
      </select>
      <button class="buy-stripe">Buy with Stripe</button>
      <button class="buy-paypal">Buy with PayPal</button>
    </div>
  </section>

  <script src="js/scripts.js" defer></script>
</body>
</html>
