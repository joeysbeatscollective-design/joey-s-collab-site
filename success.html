<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful! - Joey Flav</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .success-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    }
    .success-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 50px;
      text-align: center;
      max-width: 500px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .success-icon {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #00b894, #00cec9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 30px;
      font-size: 50px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .success-card h1 {
      color: #00b894;
      margin-bottom: 15px;
    }
    .order-details {
      background: rgba(0,0,0,0.3);
      padding: 20px;
      border-radius: 12px;
      margin: 25px 0;
      text-align: left;
    }
    .order-details p {
      margin: 10px 0;
      display: flex;
      justify-content: space-between;
    }
    .order-details strong {
      color: #00b894;
    }
    .loading {
      display: none;
    }
    .loading.active {
      display: block;
    }
    .spinner {
      border: 3px solid rgba(255,255,255,0.1);
      border-top: 3px solid #00b894;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="success-page">
    <div class="success-card">
      <div class="loading active" id="loading">
        <div class="spinner"></div>
        <p>Verifying your payment...</p>
      </div>
      
      <div id="success-content" style="display: none;">
        <div class="success-icon">
          <i class="fas fa-check"></i>
        </div>
        <h1>Payment Successful! 🎉</h1>
        <p>Your beat files are on their way to your inbox!</p>
        
        <div class="order-details">
          <p><span>Beat:</span> <strong id="beat-title">-</strong></p>
          <p><span>License:</span> <strong id="license-type">-</strong></p>
          <p><span>Email:</span> <strong id="customer-email">-</strong></p>
        </div>
        
        <p>📧 Check your email (including spam folder) for download links.</p>
        
        <div style="margin-top: 30px;">
          <a href="index.html" class="btn-primary">
            <i class="fas fa-home"></i> Back to Home
          </a>
          <a href="buy.html" class="btn-secondary" style="margin-left: 10px;">
            <i class="fas fa-music"></i> More Beats
          </a>
        </div>
      </div>
      
      <div id="error-content" style="display: none;">
        <div class="success-icon" style="background: linear-gradient(135deg, #e74c3c, #c0392b);">
          <i class="fas fa-times"></i>
        </div>
        <h1>Something went wrong 😔</h1>
        <p id="error-message">We couldn't verify your payment.</p>
        <a href="buy.html" class="btn-primary" style="margin-top: 20px;">
          Try Again
        </a>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const sessionId = urlParams.get('session_id');
      
      if (!sessionId) {
        showError('No session ID found');
        return;
      }

      try {
        const response = await fetch(`http://localhost:3000/verify-stripe-session/${sessionId}`);
        const data = await response.json();

        if (data.success) {
          document.getElementById('loading').classList.remove('active');
          document.getElementById('success-content').style.display = 'block';
          document.getElementById('beat-title').textContent = data.beatTitle;
          document.getElementById('license-type').textContent = data.license.toUpperCase();
          document.getElementById('customer-email').textContent = data.email;
        } else {
          showError(data.message || 'Payment verification failed');
        }
      } catch (error) {
        showError('Could not connect to server');
      }
    });

    function showError(message) {
      document.getElementById('loading').classList.remove('active');
      document.getElementById('error-content').style.display = 'block';
      document.getElementById('error-message').textContent = message;
    }
  </script>
</body>
</html>
