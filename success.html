<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful! - Joey Flavour</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="success-page">
  
  <div class="success-container">
    <!-- Loading State -->
    <div id="loading" class="success-card">
      <div class="loading-spinner"></div>
      <h2>Verifying your payment...</h2>
      <p>Please wait a moment</p>
    </div>
    
    <!-- Success State -->
    <div id="success" class="success-card" style="display: none;">
      <div class="success-icon">
        <i class="fas fa-check"></i>
      </div>
      <h1>Payment Successful!</h1>
      <p class="success-message">Your beat files are on their way to your inbox</p>
      
      <div class="order-details">
        <div class="detail-row">
          <span>Beat:</span>
          <strong id="beat-title">-</strong>
        </div>
        <div class="detail-row">
          <span>License:</span>
          <strong id="license-type">-</strong>
        </div>
        <div class="detail-row">
          <span>Email:</span>
          <strong id="customer-email">-</strong>
        </div>
      </div>
      
      <p class="email-note">
        <i class="fas fa-envelope"></i>
        Check your email (including spam folder) for download links
      </p>
      
      <div class="success-actions">
        <a href="index.html" class="btn-primary">
          <i class="fas fa-home"></i>
          <span>Back to Home</span>
        </a>
        <a href="buy.html" class="btn-secondary">
          <i class="fas fa-music"></i>
          <span>More Beats</span>
        </a>
      </div>
    </div>
    
    <!-- Error State -->
    <div id="error" class="success-card error" style="display: none;">
      <div class="success-icon error-icon">
        <i class="fas fa-times"></i>
      </div>
      <h1>Something went wrong</h1>
      <p id="error-message">We couldn't verify your payment.</p>
      <a href="buy.html" class="btn-primary">
        <span>Try Again</span>
      </a>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const sessionId = urlParams.get('session_id');
      
      if (!sessionId) {
        showError('No session ID found');
        return;
      }

      try {
        const response = await fetch(`http://localhost:3000/verify-stripe-session/${sessionId}`);
        const data = await response.json();

        if (data.success) {
          document.getElementById('loading').style.display = 'none';
          document.getElementById('success').style.display = 'block';
          document.getElementById('beat-title').textContent = data.beatTitle;
          document.getElementById('license-type').textContent = data.license.toUpperCase();
          document.getElementById('customer-email').textContent = data.email;
        } else {
          showError(data.message || 'Payment verification failed');
        }
      } catch (error) {
        showError('Could not connect to server');
      }
    });

    function showError(message) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      document.getElementById('error-message').textContent = message;
    }
  </script>
</body>
</html>
